plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'org.beryx.jlink' version '3.1.1'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava
    
    // LWJGL for OpenGL rendering
    implementation 'org.lwjgl:lwjgl:3.3.3'
    implementation 'org.lwjgl:lwjgl-opengl:3.3.3'
    implementation 'org.lwjgl:lwjgl-glfw:3.3.3'
    implementation 'org.lwjgl:lwjgl-stb:3.3.3'
    implementation 'org.lwjgl:lwjgl-assimp:3.3.3'
    implementation 'org.lwjgl:lwjgl-openal:3.3.3'
    implementation 'javazoom:jlayer:1.0.1'
    
    // Platform-specific natives
    runtimeOnly 'org.lwjgl:lwjgl:3.3.3:natives-windows'
    runtimeOnly 'org.lwjgl:lwjgl-opengl:3.3.3:natives-windows'
    runtimeOnly 'org.lwjgl:lwjgl-glfw:3.3.3:natives-windows'
    runtimeOnly 'org.lwjgl:lwjgl-stb:3.3.3:natives-windows'
    runtimeOnly 'org.lwjgl:lwjgl-assimp:3.3.3:natives-windows'
    runtimeOnly 'org.lwjgl:lwjgl-openal:3.3.3:natives-windows'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'flightbattlesimulator.App'
}

jlink {
    launcher {
        name = 'PlaneFlightBattle'
    }
    jpackage {
        imageName = 'PlaneFlightBattle'
        installerName = 'PlaneFlightBattle'
        installerType = 'exe'
        appVersion = '1.0.0'
        installerOptions = ['--win-console']
    }
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}
